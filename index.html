<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>APEX TRADE</title>
<style>
body{margin:0;background:#080b10;color:#e8f0fe;font-family:monospace;max-width:480px;margin:0 auto;}
.header{background:#0d1117;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1f2d40;}
.logo{color:#00d4ff;font-size:18px;font-weight:bold;}
.btn{background:transparent;border:1px solid #1f2d40;color:#e8f0fe;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:12px;}
.page{padding:14px;padding-bottom:80px;}
.hero{background:#111827;border:1px solid #1f2d40;border-radius:16px;padding:24px;text-align:center;margin-bottom:14px;}
.pnl{font-size:42px;font-weight:bold;color:#00e676;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.card{background:#111827;border:1px solid #1f2d40;border-radius:12px;padding:14px;}
.label{font-size:10px;color:#4a6080;margin-bottom:4px;}
.val{font-size:22px;font-weight:bold;}
.startbtn{background:transparent;border:2px solid #00e676;color:#00e676;padding:10px 28px;border-radius:20px;font-size:14px;font-weight:bold;cursor:pointer;font-family:monospace;margin-top:12px;}
.stopbtn{background:transparent;border:2px solid #ff1744;color:#ff1744;padding:10px 28px;border-radius:20px;font-size:14px;font-weight:bold;cursor:pointer;font-family:monospace;margin-top:12px;}
.badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:bold;margin-top:10px;}
.nav{display:flex;background:#0d1117;border-top:1px solid #1f2d40;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;}
.navbtn{flex:1;padding:12px 0;border:none;background:transparent;color:#4a6080;font-family:monospace;font-size:11px;cursor:pointer;border-top:2px solid transparent;}
.navbtn.on{color:#00d4ff;border-top-color:#00d4ff;}
.empty{background:#111827;border:1px solid #1f2d40;border-radius:12px;padding:32px;text-align:center;color:#4a6080;}
.trow{background:#111827;border:1px solid #1f2d40;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">APEX TRADE</div>
  <div>
    <span id="statusDot" class="dot" style="background:#7a9ab8"></span>
    <span id="statusTxt" style="font-size:11px;color:#7a9ab8">LOADING</span>
    &nbsp;
    <button class="btn" onclick="fetchAll()">Refresh</button>
  </div>
</div>

<div id="page" class="page"></div>

<div class="nav">
  <button class="navbtn on" id="t0" onclick="tab(0)">Overview</button>
  <button class="navbtn" id="t1" onclick="tab(1)">Signals</button>
  <button class="navbtn" id="t2" onclick="tab(2)">Trades</button>
</div>

<script>
var T=0, S=null, PR={}, TR=[], SG=[], ERR=false;

function tab(n){
  T=n;
  document.getElementById("t0").className="navbtn"+(n==0?" on":"");
  document.getElementById("t1").className="navbtn"+(n==1?" on":"");
  document.getElementById("t2").className="navbtn"+(n==2?" on":"");
  draw();
}

function fetchAll(){
  document.getElementById("statusTxt").textContent="LOADING";
  Promise.all([
    fetch("/status").then(function(r){return r.json();}),
    fetch("/prices").then(function(r){return r.json();}),
    fetch("/trades").then(function(r){return r.json();}),
    fetch("/signals").then(function(r){return r.json();})
  ]).then(function(d){
    S=d[0]; PR=d[1].prices||{}; TR=d[2].trades||[]; SG=d[3].signals||[];
    ERR=false;
    var dot=document.getElementById("statusDot");
    var txt=document.getElementById("statusTxt");
    if(S&&S.botRunning){dot.style.background="#00e676";txt.style.color="#00e676";txt.textContent="LIVE";}
    else{dot.style.background="#7a9ab8";txt.style.color="#7a9ab8";txt.textContent="PAUSED";}
    draw();
  }).catch(function(e){
    ERR=true;
    document.getElementById("statusDot").style.background="#ff1744";
    document.getElementById("statusTxt").style.color="#ff1744";
    document.getElementById("statusTxt").textContent="OFFLINE";
    draw();
  });
}

function startBot(){
  fetch("/bot/start").then(function(r){return r.json();}).then(function(){fetchAll();});
}
function stopBot(){
  fetch("/bot/stop").then(function(r){return r.json();}).then(function(){fetchAll();});
}

function draw(){
  var p=document.getElementById("page");
  if(T==0) p.innerHTML=overview();
  else if(T==1) p.innerHTML=signalsPage();
  else p.innerHTML=tradesPage();
}

function overview(){
  var bot=S&&S.botRunning;
  var eq=S?S.equity:0;
  var cash=S?S.cash:0;
  var pnl=S?S.dailyPnL:0;
  var pos=S?S.positions||[]:[];
  var pc=pnl>=0?"#00e676":"#ff1744";
  var h="";
  if(ERR) h+='<div style="background:#ff174420;border:1px solid #ff1744;border-radius:10px;padding:12px;margin-bottom:12px;color:#ff1744;font-size:12px">Cannot reach bot. Tap Refresh.</div>';
  h+='<div class="hero">';
  h+='<div style="font-size:10px;color:#4a6080;letter-spacing:2px">TODAY P&L - '+(S&&S.paper===false?"LIVE":"PAPER")+'</div>';
  h+='<div class="pnl" style="color:'+pc+'">'+(pnl>=0?"+":"")+"$"+Math.abs(pnl).toFixed(2)+'</div>';
  h+='<div style="color:#7a9ab8;font-size:12px;margin-top:6px">Equity $'+Math.round(eq)+' &nbsp; Cash $'+Math.round(cash)+'</div>';
  h+='<div><span class="badge" style="background:'+(bot?"#00e67620":"#ff174420")+';color:'+(bot?"#00e676":"#ff1744")+';border:1px solid '+(bot?"#00e676":"#ff1744")+'">'+(bot?"BOT ACTIVE":"BOT PAUSED")+'</span></div>';
  h+='<button class="'+(bot?"stopbtn":"startbtn")+'" onclick="'+(bot?"stopBot":"startBot")+'()">'+(bot?"Pause Bot":"Start Bot")+'</button>';
  h+='</div>';
  h+='<div class="grid">';
  h+='<div class="card"><div class="label">EQUITY</div><div class="val" style="color:#00d4ff">$'+Math.round(eq)+'</div></div>';
  h+='<div class="card"><div class="label">CASH</div><div class="val" style="color:#00e676">$'+Math.round(cash)+'</div></div>';
  h+='<div class="card"><div class="label">POSITIONS</div><div class="val" style="color:#ffd740">'+pos.length+'</div></div>';
  h+='<div class="card"><div class="label">MODE</div><div class="val" style="color:#7a9ab8">'+(S&&S.paper===false?"LIVE":"PAPER")+'</div></div>';
  h+='</div>';
  if(pos.length>0){
    h+='<div style="font-size:10px;color:#4a6080;margin-bottom:8px">OPEN POSITIONS</div>';
    for(var i=0;i<pos.length;i++){
      var pp=pos[i];
      h+='<div class="trow"><div><b>'+pp.symbol+'</b><div style="font-size:11px;color:#4a6080">Qty: '+pp.qty+'</div></div>';
      h+='<b style="color:'+(pp.pnl>=0?"#00e676":"#ff1744")+'">'+(pp.pnl>=0?"+":"")+"$"+pp.pnl.toFixed(2)+'</b></div>';
    }
  }
  h+='<div style="font-size:10px;color:#4a6080;margin-bottom:8px;margin-top:4px">WATCHLIST</div>';
  var wl=["SPY","NVDA","AAPL","MSFT","QQQ","TSLA","AMZN","GOOGL","META"];
  for(var j=0;j<wl.length;j++){
    var sym=wl[j];
    var price=PR[sym];
    h+='<div class="trow"><b>'+sym+'</b><span style="color:#7a9ab8">'+(price?"$"+price.toFixed(2):"--")+'</span></div>';
  }
  return h;
}

function signalsPage(){
  var bot=S&&S.botRunning;
  var h='<div style="font-size:10px;color:#4a6080;margin-bottom:10px">LIVE SIGNALS</div>';
  if(SG.length==0){
    h+='<div class="empty">'+(bot?"Bot scanning markets...<br>Signals appear when conditions are met.":"Start the bot to see signals.<br><br><button class=\"startbtn\" onclick=\"startBot()\">Start Bot</button>")+'</div>';
  } else {
    for(var i=0;i<SG.length;i++){
      var s=SG[i];
      var c=s.type=="BUY"?"#00e676":"#ff1744";
      h+='<div class="card" style="margin-bottom:10px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      h+='<b style="font-size:16px">'+s.symbol+'</b>';
      h+='<span style="background:'+c+'20;color:'+c+';border:1px solid '+c+';border-radius:8px;padding:5px 14px;font-weight:bold">'+s.type+'</span>';
      h+='</div>';
      h+='<div style="font-size:11px;color:#4a6080">Confidence: <b style="color:'+(s.confidence>=80?"#00e676":"#ffd740")+'">'+s.confidence+'%</b></div>';
      h+='<div style="font-size:11px;color:#4a6080;margin-top:4px">'+s.reason+'</div>';
      h+='</div>';
    }
  }
  return h;
}

function tradesPage(){
  var total=0;
  for(var i=0;i<TR.length;i++) total+=TR[i].pnl||0;
  var wins=0;
  for(var j=0;j<TR.length;j++) if((TR[j].pnl||0)>0) wins++;
  var h='<div class="card" style="display:flex;justify-content:space-between;margin-bottom:14px">';
  h+='<div><div class="label">REALIZED P&L</div><div class="val" style="color:'+(total>=0?"#00e676":"#ff1744")+'">'+(total>=0?"+":"")+"$"+Math.abs(total).toFixed(2)+'</div></div>';
  h+='<div style="text-align:right"><div class="label">WIN/LOSS</div><div class="val"><span style="color:#00e676">'+wins+'</span>/<span style="color:#ff1744">'+(TR.length-wins)+'</span></div></div>';
  h+='</div>';
  if(TR.length==0){
    h+='<div class="empty">No trades yet.<br>Start the bot and trades appear here.</div>';
  } else {
    for(var k=0;k<TR.length;k++){
      var t=TR[k];
      var up=(t.pnl||0)>=0;
      h+='<div class="trow" style="border-left:3px solid '+(up?"#00e676":"#ff1744")+';border-radius:0 12px 12px 0">';
      h+='<div><b>'+t.symbol+'</b> <span style="background:'+(t.side=="BUY"?"#00e67620":"#ff174420")+';color:'+(t.side=="BUY"?"#00e676":"#ff1744")+';border-radius:4px;padding:1px 7px;font-size:10px">'+t.side+'</span>';
      h+='<div style="font-size:10px;color:#4a6080;margin-top:2px">'+t.strategy+'</div></div>';
      h+='<div style="text-align:right"><b style="color:'+(up?"#00e676":"#ff1744")+'">'+(t.pnl!=null?(up?"+":"")+"$"+Math.abs(t.pnl).toFixed(2):"Open")+'</b>';
      h+='<div style="font-size:10px;color:#4a6080">'+t.time+'</div></div>';
      h+='</div>';
    }
  }
  return h;
}

fetchAll();
setInterval(fetchAll,30000);
</script>
</body>
</html>
